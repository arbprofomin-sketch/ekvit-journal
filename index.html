<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ЭКВИТ — Журнал</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #F0F2F8;
  --white: #FFFFFF;
  --surface: #FFFFFF;
  --surface2: #F5F6FA;
  --border: rgba(0,0,0,0.07);
  --red: #E8192C;
  --red-dim: rgba(232,25,44,0.1);
  --gold: #F5A800;
  --gold-dim: rgba(245,168,0,0.12);
  --green: #12B76A;
  --green-dim: rgba(18,183,106,0.1);
  --blue: #3B82F6;
  --text: #111827;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  --radius: 16px;
  --radius-sm: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }

body { font-family: 'Nunito', sans-serif; color: var(--text); font-size: 15px; }

/* ─── PAGES ─── */
.page { display: none; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
.page.active { display: block; }

/* ─── LOGIN ─── */
.login-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 28px 20px;
  background: linear-gradient(160deg, #fff5f5 0%, #F0F2F8 100%);
}
.login-emblem { 
  width: 80px; height: 80px; border-radius: 22px;
  background: var(--red); display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px; box-shadow: 0 8px 32px rgba(232,25,44,0.3);
}
.login-emblem-txt { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: white; letter-spacing: 2px; }
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--red); letter-spacing: 5px; }
.login-tagline { font-size: 13px; color: var(--text2); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
.login-card {
  width: 100%; max-width: 380px;
  background: var(--white); border-radius: 24px;
  padding: 28px 24px; box-shadow: var(--shadow-md);
}
.login-card-title { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
.login-card-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
.field select, .field input {
  width: 100%; background: var(--surface2); border: 2px solid transparent;
  border-radius: var(--radius-sm); padding: 13px 16px;
  color: var(--text); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700;
  outline: none; appearance: none; transition: border-color 0.2s;
}
.field select:focus, .field input:focus { border-color: var(--red); background: white; }
.btn-primary {
  width: 100%; background: var(--red); color: white; border: none;
  border-radius: var(--radius-sm); padding: 15px;
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
  cursor: pointer; box-shadow: 0 4px 16px rgba(232,25,44,0.3);
  transition: all 0.15s; margin-top: 4px;
}
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.login-err { color: var(--red); font-size: 13px; font-weight: 700; margin-top: 10px; text-align: center; display: none; }

/* ─── HEADER ─── */
.hdr {
  background: var(--white); border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow); padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 50;
}
.hdr-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--red); letter-spacing: 3px; line-height: 1; }
.hdr-sub { font-size: 11px; color: var(--text2); font-weight: 700; margin-top: 1px; }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.hdr-trainer { font-size: 13px; color: var(--text2); font-weight: 700; }
.btn-icon {
  width: 38px; height: 38px; border-radius: 11px;
  background: var(--surface2); border: 1.5px solid var(--border);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; color: var(--text);
}
.btn-icon:active { background: #E5E7EB; }

/* ─── SECTION LABEL ─── */
.sec-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); padding: 20px 16px 10px; }

/* ─── GROUP CARDS ─── */
.groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 14px; }
.group-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 18px 14px;
  cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow);
}
.group-card:active { transform: scale(0.96); box-shadow: none; }
.gc-icon { font-size: 32px; margin-bottom: 10px; }
.gc-name { font-size: 14px; font-weight: 900; color: var(--text); line-height: 1.3; }
.gc-time { font-size: 12px; color: var(--text2); font-weight: 600; margin-top: 3px; }
.gc-count {
  display: inline-block; margin-top: 10px;
  background: var(--surface2); border-radius: 20px;
  padding: 3px 10px; font-size: 12px; color: var(--text2); font-weight: 700;
}

/* ─── ATTENDANCE HEADER ─── */
.att-hdr {
  background: var(--white); border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow); padding: 14px 16px;
  position: sticky; top: 0; z-index: 40;
}
.att-hdr-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.btn-back {
  width: 38px; height: 38px; border-radius: 11px;
  background: var(--surface2); border: 1.5px solid var(--border);
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.att-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); flex: 1; line-height: 1.1; }
.chip { padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 800; white-space: nowrap; }
.chip-green { background: var(--green-dim); color: var(--green); }
.chip-red { background: var(--red-dim); color: var(--red); }
.chip-gold { background: var(--gold-dim); color: var(--gold); }

/* ─── LEGEND ─── */
.legend {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 0 16px 12px; 
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--text2); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.ld-absent { background: #E5E7EB; }
.ld-present { background: var(--green); }
.ld-sticker { background: var(--gold); }

/* ─── SEARCH ─── */
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; background: var(--surface2); border: 2px solid transparent;
  border-radius: var(--radius-sm); padding: 11px 16px 11px 40px;
  color: var(--text); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
  outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--blue); background: white; }
.search-ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text3); pointer-events: none; }

/* ─── STUDENT ROW ─── */
.students-list { padding: 10px 14px 0; }

.stu-row {
  background: var(--white); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 14px 14px;
  margin-bottom: 8px; box-shadow: var(--shadow);
  transition: all 0.15s;
}
.stu-row.present { border-color: var(--green); background: #F0FDF7; }
.stu-row.has-sticker { border-color: var(--gold); background: #FFFBEB; }

/* Верхняя строка: аватар + имя + чекбокс */
.stu-top { display: flex; align-items: center; gap: 12px; }

.stu-ava {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--surface2); border: 2.5px solid #E5E7EB;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 15px; color: var(--text2);
  flex-shrink: 0; transition: all 0.2s; cursor: pointer;
}
.stu-row.present .stu-ava { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.stu-row.has-sticker .stu-ava { background: var(--gold-dim); border-color: var(--gold); font-size: 22px; }

.stu-info { flex: 1; cursor: pointer; }
.stu-name { font-size: 16px; font-weight: 900; color: var(--text); }
.stu-meta { font-size: 12px; color: var(--text2); font-weight: 600; margin-top: 2px; }

.stu-toggle {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2.5px solid #D1D5DB; background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  color: transparent;
}
.stu-row.present .stu-toggle, .stu-row.has-sticker .stu-toggle {
  background: var(--green); border-color: var(--green); color: white;
}

/* Нижняя строка: действия (появляется когда отмечен) */
.stu-actions {
  margin-top: 10px; padding-top: 10px;
  border-top: 1.5px solid rgba(0,0,0,0.06);
  display: none; align-items: center; gap: 8px;
}
.stu-row.present .stu-actions, .stu-row.has-sticker .stu-actions { display: flex; }

.action-label { font-size: 12px; font-weight: 700; color: var(--text2); flex: 1; }

.btn-give-sticker {
  display: flex; align-items: center; gap: 6px;
  background: var(--gold); color: white; border: none;
  border-radius: 10px; padding: 8px 14px;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-give-sticker:active { transform: scale(0.96); }
.btn-give-sticker.has { background: #FEF3C7; color: #92400E; border: 1.5px solid var(--gold); }

.btn-cancel-sticker {
  display: flex; align-items: center; gap: 4px;
  background: #FEE2E2; color: #B91C1C; border: none;
  border-radius: 10px; padding: 8px 12px;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-cancel-sticker:active { transform: scale(0.96); }

/* ─── STICKER SHEET ─── */
.sticker-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--white); border-top: 2px solid var(--border);
  border-radius: 24px 24px 0 0; padding: 16px 16px 36px;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 75vh; overflow-y: auto; box-shadow: 0 -8px 32px rgba(0,0,0,0.12);
}
.sticker-sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 5px; background: #E5E7EB; border-radius: 3px; margin: 0 auto 18px; }
.sheet-title { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 16px; }
.sticker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
.sticker-opt {
  aspect-ratio: 1; background: var(--surface2); border-radius: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 26px; cursor: pointer; transition: all 0.15s;
  border: 2.5px solid transparent;
}
.sticker-opt:active { transform: scale(0.9); }
.sticker-opt.selected { border-color: var(--gold); background: var(--gold-dim); box-shadow: 0 2px 8px rgba(245,168,0,0.3); }
.sticker-opt-name { font-size: 8px; color: var(--text2); margin-top: 3px; text-align: center; line-height: 1.2; font-weight: 700; }

.sheet-confirm {
  width: 100%; background: var(--gold); color: white; border: none;
  border-radius: var(--radius-sm); padding: 15px;
  font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
  cursor: pointer; box-shadow: 0 4px 16px rgba(245,168,0,0.35);
}
.sheet-confirm:active { opacity: 0.9; }
.btn-sec {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px; color: var(--text);
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
  cursor: pointer; margin-top: 8px; transition: background 0.15s;
}
.btn-sec:active { background: #E5E7EB; }

/* ─── ADD STUDENT ─── */
.add-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--white); border-top: 2px solid var(--border);
  border-radius: 24px 24px 0 0; padding: 16px 16px 36px;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.12);
}
.add-sheet.open { transform: translateY(0); }

/* ─── OVERLAY ─── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 190; display: none; backdrop-filter: blur(2px); }
.overlay.open { display: block; }

/* ─── FINISH BAR ─── */
.finish-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 12px 16px 28px;
  background: linear-gradient(to top, var(--bg) 65%, transparent);
}
.btn-finish {
  width: 100%; background: var(--red); color: white; border: none;
  border-radius: var(--radius-sm); padding: 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
  cursor: pointer; box-shadow: 0 4px 20px rgba(232,25,44,0.35);
  transition: all 0.15s;
}
.btn-finish:disabled { background: #D1D5DB; box-shadow: none; color: #9CA3AF; }
.btn-finish:not(:disabled):active { transform: scale(0.98); }

/* ─── RESULT ─── */
.result-wrap { padding: 20px 16px; }
.result-hero { text-align: center; padding: 28px 0 24px; }
.result-emoji { font-size: 64px; animation: pop 0.5s ease; }
@keyframes pop { 0%{transform:scale(0) rotate(-10deg)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
.result-h { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; color: var(--text); margin-top: 12px; }
.result-sub2 { font-size: 14px; color: var(--text2); font-weight: 600; margin-top: 6px; }

.sticker-award {
  background: var(--white); border: 2px solid rgba(245,168,0,0.4);
  border-radius: 20px; padding: 22px; text-align: center;
  margin-bottom: 18px; box-shadow: var(--shadow);
}
.award-emoji { font-size: 54px; animation: spinPop 0.5s ease 0.2s both; }
@keyframes spinPop { 0%{transform:rotate(-15deg) scale(0)} 100%{transform:rotate(0) scale(1)} }
.award-label { font-size: 11px; color: var(--gold); letter-spacing: 2px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
.award-name { font-size: 20px; font-weight: 900; color: var(--text); margin-top: 4px; }
.award-desc { font-size: 13px; color: var(--text2); margin-top: 3px; font-weight: 600; }

.result-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--white); border-radius: var(--radius-sm);
  padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow);
  animation: slideIn 0.3s ease both;
  border: 1.5px solid var(--border);
}
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.result-emo { font-size: 24px; }
.result-name2 { flex: 1; font-weight: 800; font-size: 15px; color: var(--text); }
.result-badge {
  font-size: 12px; font-weight: 800; color: var(--gold);
  background: var(--gold-dim); border-radius: 20px; padding: 3px 10px;
}

/* ─── RATING ─── */
.rating-list { padding: 0 14px; }
.rating-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 13px 14px;
  margin-bottom: 8px; box-shadow: var(--shadow);
}
.rating-pos {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 17px; flex-shrink: 0;
}
.pos-1 { background: var(--gold); color: white; }
.pos-2 { background: #94A3B8; color: white; }
.pos-3 { background: #CD7F32; color: white; }
.pos-other { background: var(--surface2); color: var(--text2); }
.rating-name { font-weight: 800; font-size: 15px; color: var(--text); }
.rating-group { font-size: 12px; color: var(--text2); font-weight: 600; margin-top: 2px; }
.rating-count { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); line-height: 1; }
.rating-lbl { font-size: 11px; color: var(--text2); font-weight: 700; }

/* ─── TABS ─── */
.tabs { display: flex; gap: 4px; background: #E5E7EB; border-radius: 14px; padding: 4px; margin: 0 16px 16px; }
.tab { flex: 1; padding: 9px 4px; text-align: center; font-size: 13px; font-weight: 800; color: var(--text2); border-radius: 11px; cursor: pointer; transition: all 0.2s; }
.tab.active { background: var(--red); color: white; box-shadow: 0 2px 8px rgba(232,25,44,0.3); }

/* ─── TOAST ─── */
.toast {
  position: fixed; top: 76px; left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--green); color: white; font-weight: 800; font-size: 14px;
  padding: 9px 20px; border-radius: 20px; opacity: 0;
  transition: all 0.25s; z-index: 999; white-space: nowrap;
  pointer-events: none; box-shadow: 0 4px 16px rgba(18,183,106,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.red { background: var(--red); box-shadow: 0 4px 16px rgba(232,25,44,0.4); }

/* ─── EMPTY ─── */
.empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 15px; font-weight: 700; }
.empty-ico { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay" onclick="closeSheets()"></div>

<!-- ══════ LOGIN ══════ -->

<div id="page-att" class="page">

};
const STICKERS = [
  {e:'🥊',n:'Перчатки'},{e:'⚡',n:'Молния'},{e:'🔥',n:'Огонь'},{e:'🦅',n:'Орёл'},
  {e:'💪',n:'Сила'},{e:'🎯',n:'Цель'},{e:'🛡️',n:'Щит'},{e:'⭐',n:'Звезда'},
  {e:'🥋',n:'Кимоно'},{e:'🏆',n:'Кубок'},{e:'💥',n:'Взрыв'},{e:'🎖️',n:'Орден'},
  {e:'🦁',n:'Лев'},{e:'🌟',n:'Суперзвезда'},{e:'⚔️',n:'Мечи'},{e:'🐯',n:'Тигр'},
  {e:'🚀',n:'Ракета'},{e:'🌊',n:'Волна'},{e:'🏹',n:'Стрела'},{e:'👑',n:'Корона'},
];

// ═══ ХРАНИЛИЩЕ ═══
function db() { try { return JSON.parse(localStorage.getItem('ekvit_v3')||'{}'); } catch(e){return{};} }
function save(d) { localStorage.setItem('ekvit_v3', JSON.stringify(d)); }

function getStudents(gid) {
  const d = db();
  if (!d.students) d.students = {};
  if (!d.students[gid]) { d.students[gid] = [...(DEFAULT_STUDENTS[gid]||[])]; save(d); }
  return d.students[gid];
}
function addStudentDB(gid, name) {
  const d = db(); if (!d.students) d.students = {};
  if (!d.students[gid]) d.students[gid] = [...(DEFAULT_STUDENTS[gid]||[])];
  if (!d.students[gid].includes(name)) { d.students[gid].push(name); save(d); }
}
function getSD(name) {
  const d = db(); if (!d.sdata) d.sdata = {};
  if (!d.sdata[name]) d.sdata[name] = { visits:0, stickers:[] };
  return d.sdata[name];
}
function saveSD(name, sd) {
  const d = db(); if (!d.sdata) d.sdata = {};
  d.sdata[name] = sd; save(d);
}

// ═══ СОСТОЯНИЕ ═══
let currentTrainer = null, currentGroup = null;
let presentSet = new Set();   // кто пришёл
let stickerMap = {};           // name -> emoji (выданные наклейки)
let stickerTarget = null, selectedSticker = null;

// ═══ АВТОРИЗАЦИЯ ═══
function doLogin() {
  const tid = document.getElementById('loginTrainer').value;
  const pass = document.getElementById('loginPass').value;
  if (!tid) { showErr('Выберите тренера'); return; }
  if (TRAINERS[tid].pass !== pass) { showErr('Неверный пароль'); return; }
  currentTrainer = tid;
  document.getElementById('hdrSub').textContent = TRAINERS[tid].name;
  document.getElementById('groupsLabel').textContent = `Группы — ${TRAINERS[tid].name}`;
  renderGroups(); showPage('page-groups');
}
function doLogout() {
  currentTrainer = null; currentGroup = null; presentSet = new Set(); stickerMap = {};
  document.getElementById('loginTrainer').value = '';
  document.getElementById('loginPass').value = '';
  showPage('page-login');
}
function showErr(msg) { const e=document.getElementById('loginErr'); e.textContent=msg; e.style.display='block'; }
function clearErr() { document.getElementById('loginErr').style.display='none'; }

// ═══ ГРУППЫ ═══
function renderGroups() {
  const gids = TRAINERS[currentTrainer].groups;
  document.getElementById('groupsGrid').innerHTML = gids.map(gid => {
    const g = GROUPS_DEF[gid];
    const cnt = getStudents(gid).length;
    return `<div class="group-card" onclick="selectGroup('${gid}')">
      <div class="gc-icon">${g.icon}</div>
      <div class="gc-name">${g.name}</div>
      <div class="gc-time">${g.time}</div>
      <div class="gc-count">${cnt} уч.</div>
    </div>`;
  }).join('');
}
function selectGroup(gid) {
  currentGroup = gid; presentSet = new Set(); stickerMap = {};
  document.getElementById('attTitle').textContent = GROUPS_DEF[gid].name + ' ' + GROUPS_DEF[gid].time;
  document.getElementById('searchInp').value = '';
  renderStudents(); showPage('page-att');
}
function goGroups() { renderGroups(); showPage('page-groups'); }

// ═══ ЖУРНАЛ ═══
function renderStudents() {
  const students = getStudents(currentGroup);
  const q = document.getElementById('searchInp').value.toLowerCase();
  const filtered = students.filter(s => s.toLowerCase().includes(q));
  const list = document.getElementById('studentsList');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">🔍</div>Никого не нашли</div>`;
  } else {
    list.innerHTML = filtered.map(name => {
      const present = presentSet.has(name);
      const sticker = stickerMap[name];
      const hasSticker = !!sticker;
      const ini = name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const sd = getSD(name);
      let rowCls = hasSticker ? 'has-sticker' : present ? 'present' : '';
      let avaContent = hasSticker ? sticker : ini;

      // Кнопки действий (показываются только если присутствует)
      let actionsHtml = '';
      if (present || hasSticker) {
        if (hasSticker) {
          actionsHtml = `
            <div class="action-label">Наклейка: ${sticker} ${STICKERS.find(s=>s.e===sticker)?.n||''}</div>
            <button class="btn-give-sticker has" onclick="openStickerPicker('${name}')">✏️ Изменить</button>
            <button class="btn-cancel-sticker" onclick="removeSticker('${name}')">✕ Убрать</button>`;
        } else {
          actionsHtml = `
            <div class="action-label">Хочешь вручить наклейку?</div>
            <button class="btn-give-sticker" onclick="openStickerPicker('${name}')">🎖 Дать наклейку</button>`;
        }
      }

      return `<div class="stu-row ${rowCls}">
        <div class="stu-top">
          <div class="stu-ava" onclick="togglePresent('${name}')">${avaContent}</div>
          <div class="stu-info" onclick="togglePresent('${name}')">
            <div class="stu-name">${name}</div>
            <div class="stu-meta">${hasSticker ? '🎖 Наклейка выдана' : present ? '✓ Присутствует — нажми для отмены' : 'Нажми чтобы отметить'} · ${sd.visits} трен.</div>
          </div>
          <div class="stu-toggle" onclick="togglePresent('${name}')">${(present||hasSticker)?'✓':''}</div>
        </div>
        ${(present||hasSticker) ? `<div class="stu-actions">${actionsHtml}</div>` : ''}
      </div>`;
    }).join('');
  }

  list.innerHTML += `<div style="padding:10px 0 4px">
    <button class="btn-sec" onclick="openAddSheet()">+ Добавить ученика</button>
  </div>`;

  updateCount();
}

function togglePresent(name) {
  if (stickerMap[name]) {
    // У кого есть наклейка — отменяем через отдельную кнопку
    showToast('Сначала убери наклейку, чтобы отменить присутствие', true);
    return;
  }
  if (presentSet.has(name)) {
    presentSet.delete(name);
    showToast(`${name.split(' ')[0]} — отмена`, true);
  } else {
    presentSet.add(name);
    showToast(`${name.split(' ')[0]} отмечен ✓`);
  }
  renderStudents();
}

function removeSticker(name) {
  delete stickerMap[name];
  showToast(`Наклейка у ${name.split(' ')[0]} убрана`, true);
  renderStudents();
}

function updateCount() {
  const total = getStudents(currentGroup).length;
  document.getElementById('attCount').textContent = `${presentSet.size} / ${total}`;
  document.getElementById('finishBtn').disabled = presentSet.size === 0;
}

// ═══ НАКЛЕЙКИ ═══
function openStickerPicker(name) {
  stickerTarget = name; selectedSticker = stickerMap[name] || null;
  document.getElementById('stickerSheetTitle').textContent = `Наклейка для ${name.split(' ')[0]}`;
  document.getElementById('stickerGrid').innerHTML = STICKERS.map(s =>
    `<div class="sticker-opt ${selectedSticker===s.e?'selected':''}" onclick="selectStickerOpt('${s.e}',this)">
      <div>${s.e}</div><div class="sticker-opt-name">${s.n}</div>
    </div>`).join('');
  document.getElementById('stickerSheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function selectStickerOpt(emoji, el) {
  selectedSticker = emoji;
  document.querySelectorAll('.sticker-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function confirmSticker() {
  if (!selectedSticker || !stickerTarget) return;
  stickerMap[stickerTarget] = selectedSticker;
  presentSet.add(stickerTarget);
  closeSheets(); renderStudents();
  showToast(`${stickerTarget.split(' ')[0]} получил ${selectedSticker}`);
}

// ═══ ДОБАВИТЬ УЧЕНИКА ═══
function openAddSheet() {
  document.getElementById('addName').value = '';
  document.getElementById('addSheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('addName').focus(), 300);
}
function confirmAddStudent() {
  const name = document.getElementById('addName').value.trim();
  if (!name) return;
  addStudentDB(currentGroup, name);
  closeSheets(); renderStudents();
  showToast(`${name} добавлен`);
}
function closeSheets() {
  document.querySelectorAll('.sticker-sheet,.add-sheet').forEach(s=>s.classList.remove('open'));
  document.getElementById('overlay').classList.remove('open');
}

// ═══ ЗАВЕРШЕНИЕ ═══
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz_yyx-GkmciOF-syqMjirAIyVtsyS-TEO93Y7AM5ZNHD_epwDabk5iCUmMf5zNgfk4_Q/exec';

async function sendToSheets(rows) {
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({rows})
    });
  } catch(e) { console.log('Sheets:', e); }
}

function finishTraining() {
  if (!presentSet.size) return;
  const now = new Date();
  const dateStr = now.toLocaleDateString('ru-RU');
  const presentArr = [...presentSet];

  // Наклейка дня
  const counts = {};
  Object.values(stickerMap).forEach(e=>{counts[e]=(counts[e]||0)+1;});
  const topE = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0] || STICKERS[0].e;
  const topS = STICKERS.find(s=>s.e===topE) || STICKERS[0];

  // Сохраняем локально
  presentArr.forEach(name => {
    const sd = getSD(name);
    sd.visits = (sd.visits||0) + 1;
    if (stickerMap[name]) sd.stickers.push({e:stickerMap[name], date:dateStr, group:GROUPS_DEF[currentGroup].name});
    saveSD(name, sd);
  });

  // Отправляем в Google Sheets
  const rows = presentArr.map(name => ({
    name: name,
    group: GROUPS_DEF[currentGroup].name,
    date: dateStr,
    sticker: stickerMap[name] || '',
    trainer: TRAINERS[currentTrainer].name
  }));
  sendToSheets(rows);

  // Показываем
  const stickerCount = Object.keys(stickerMap).length;
  document.getElementById('resultSub').textContent = `${presentArr.length} учеников · ${dateStr} · ${GROUPS_DEF[currentGroup].name}`;
  document.getElementById('stickerAward').innerHTML = `
    <div class="award-emoji">${topS.e}</div>
    <div class="award-label">Выдано наклеек сегодня</div>
    <div class="award-name">${stickerCount} из ${presentArr.length}</div>
    <div class="award-desc">${stickerCount > 0 ? topS.n + ' — самая популярная' : 'Наклейки не выдавались'}</div>`;

  document.getElementById('resultList').innerHTML = presentArr.map((name,i) => {
    const sd = getSD(name);
    return `<div class="result-row" style="animation-delay:${i*0.04}s">
      <div class="result-emo">${stickerMap[name]||'✓'}</div>
      <div class="result-name2">${name}</div>
      <div class="result-badge">🏅 ${sd.visits}</div>
    </div>`;
  }).join('');

  showPage('page-result');
}

// ═══ РЕЙТИНГ ═══
function showRating() {
  const now = new Date();
  document.getElementById('ratingDate').textContent = now.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  buildRating();
  showPage('page-rating');
}
function buildRating() {
  const gids = TRAINERS[currentTrainer].groups;
  const all = [];
  gids.forEach(gid => {
    getStudents(gid).forEach(name => {
      if (!all.find(s=>s.name===name)) {
        const sd = getSD(name);
        all.push({name, visits:sd.visits||0, stickers:sd.stickers?.length||0, group:GROUPS_DEF[gid].name});
      }
    });
  });
  const byV = [...all].sort((a,b)=>b.visits-a.visits);
  const byS = [...all].sort((a,b)=>b.stickers-a.stickers);

  function html(arr, key, lbl) {
    if (arr.every(s=>s[key]===0)) return `<div class="empty"><div class="empty-ico">📊</div>Пока нет данных</div>`;
    return arr.map((s,i)=>`<div class="rating-row">
      <div class="rating-pos ${i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'pos-other'}">${i+1}</div>
      <div style="flex:1"><div class="rating-name">${s.name}</div><div class="rating-group">${s.group}</div></div>
      <div style="text-align:right"><div class="rating-count">${s[key]}</div><div class="rating-lbl">${lbl}</div></div>
    </div>`).join('');
  }
  document.getElementById('tab-visits').innerHTML = html(byV,'visits','трен.');
  document.getElementById('tab-stickers').innerHTML = html(byS,'stickers','накл.');
}
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  document.getElementById('tab-visits').style.display = id==='tab-visits'?'block':'none';
  document.getElementById('tab-stickers').style.display = id==='tab-stickers'?'block':'none';
}

// ═══ УТИЛИТЫ ═══
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop = 0;
}
function showToast(msg, red=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (red?' red':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
</script>
</body>
